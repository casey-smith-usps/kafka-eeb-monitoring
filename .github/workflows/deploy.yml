name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          GITHUB_ACTIONS: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_CONFLUENT_ADMIN_URL: ${{ secrets.VITE_CONFLUENT_ADMIN_URL }}
          VITE_CONFLUENT_CLUSTER_ID: ${{ secrets.VITE_CONFLUENT_CLUSTER_ID }}
          VITE_CONFLUENT_API_KEY: ${{ secrets.VITE_CONFLUENT_API_KEY }}
          VITE_CONFLUENT_API_SECRET: ${{ secrets.VITE_CONFLUENT_API_SECRET }}

      - name: Add .nojekyll file
        run: touch ./dist/.nojekyll

      - name: Copy index.html to 404.html for SPA routing
        run: cp ./dist/index.html ./dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
