<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Kafka Sync</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-8">
    <div class="max-w-4xl mx-auto">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <h1 class="text-3xl font-bold text-slate-900 mb-6">🔄 Test Kafka Sync</h1>

            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Kafka Admin API URL
                    </label>
                    <input
                        type="text"
                        id="kafkaUrl"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        value="https://lkc-33v902.dom4gl8rd6w.eastus.azure.confluent.cloud:443"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        Cluster ID
                    </label>
                    <input
                        type="text"
                        id="clusterId"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        value="lkc-33v902"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        API Key
                    </label>
                    <input
                        type="text"
                        id="apiKey"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        value="XW3T6QRAT4VPGPUO"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">
                        API Secret
                    </label>
                    <input
                        type="password"
                        id="apiSecret"
                        class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none"
                        value="cfltvsREZFEb2Nleb17TvjSzNHZYD723W8fPIC2qBqlRKQ1Gg0EjJ7vXJaLz7mmA"
                    />
                </div>
            </div>

            <button
                onclick="testSync()"
                class="w-full bg-blue-600 text-white py-3 rounded-lg font-semibold hover:bg-blue-700 transition-colors"
            >
                🚀 Test Sync
            </button>

            <div id="status" class="mt-6 hidden">
                <div class="p-4 rounded-lg" id="statusContent"></div>
            </div>

            <div id="results" class="mt-6 hidden">
                <h2 class="text-xl font-bold text-slate-900 mb-4">Results</h2>
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-green-50 border border-green-200 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-green-900" id="syncedCount">0</p>
                        <p class="text-sm text-green-700">New Topics</p>
                    </div>
                    <div class="bg-blue-50 border border-blue-200 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-blue-900" id="updatedCount">0</p>
                        <p class="text-sm text-blue-700">Updated</p>
                    </div>
                    <div class="bg-red-50 border border-red-200 rounded-lg p-4 text-center">
                        <p class="text-3xl font-bold text-red-900" id="failedCount">0</p>
                        <p class="text-sm text-red-700">Failed</p>
                    </div>
                </div>

                <div id="errorsList" class="hidden bg-red-50 border border-red-200 rounded-lg p-4">
                    <h3 class="font-semibold text-red-900 mb-2">Errors</h3>
                    <ul id="errors" class="text-sm text-red-800 space-y-1"></ul>
                </div>

                <div id="successMessage" class="hidden bg-green-50 border border-green-200 rounded-lg p-4">
                    <p class="text-sm text-green-800">
                        <strong>✅ Success!</strong> Topics have been synced to Supabase.
                    </p>
                </div>
            </div>

            <div id="logs" class="mt-6 bg-slate-900 text-green-400 p-4 rounded-lg font-mono text-xs max-h-96 overflow-y-auto hidden">
                <div id="logContent"></div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://dowixaqpokruwwqcykzo.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRvd2l4YXFwb2tydXd3cWN5a3pvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk3MDMwMTYsImV4cCI6MjA4NTI3OTAxNn0.L5g60FLYwAZ9IRJXDN2U6sLJHrNnF_PtHQNP5cxV0oc';

        function log(message) {
            const logDiv = document.getElementById('logs');
            const logContent = document.getElementById('logContent');
            logDiv.classList.remove('hidden');
            const timestamp = new Date().toLocaleTimeString();
            logContent.innerHTML += `<div>[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }

        function showStatus(message, type = 'info') {
            const statusDiv = document.getElementById('status');
            const statusContent = document.getElementById('statusContent');
            statusDiv.classList.remove('hidden');

            const bgColors = {
                info: 'bg-blue-50 border-blue-200 text-blue-800',
                success: 'bg-green-50 border-green-200 text-green-800',
                error: 'bg-red-50 border-red-200 text-red-800',
                warning: 'bg-yellow-50 border-yellow-200 text-yellow-800'
            };

            statusContent.className = `p-4 rounded-lg border ${bgColors[type]}`;
            statusContent.textContent = message;
        }

        async function testSync() {
            try {
                // Clear previous results
                document.getElementById('results').classList.add('hidden');
                document.getElementById('logs').classList.add('hidden');
                document.getElementById('logContent').innerHTML = '';

                const kafkaUrl = document.getElementById('kafkaUrl').value;
                const clusterId = document.getElementById('clusterId').value;
                const apiKey = document.getElementById('apiKey').value;
                const apiSecret = document.getElementById('apiSecret').value;

                log('🚀 Starting Kafka sync test...');
                log(`📡 Admin URL: ${kafkaUrl}`);
                log(`🔑 Cluster ID: ${clusterId}`);

                showStatus('⏳ Syncing topics from Kafka...', 'info');

                const edgeFunctionUrl = `${SUPABASE_URL}/functions/v1/sync-kafka-topics`;
                log(`📤 Calling edge function: ${edgeFunctionUrl}`);

                const response = await fetch(edgeFunctionUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
                    },
                    body: JSON.stringify({
                        kafkaAdminUrl: kafkaUrl,
                        clusterId: clusterId,
                        kafkaApiKey: apiKey,
                        kafkaApiSecret: apiSecret
                    })
                });

                log(`📥 Response status: ${response.status}`);

                if (!response.ok) {
                    const errorText = await response.text();
                    log(`❌ Error response: ${errorText}`);
                    throw new Error(`Request failed with status ${response.status}: ${errorText}`);
                }

                const data = await response.json();
                log(`✅ Response received`);
                log(`📊 Raw response: ${JSON.stringify(data, null, 2)}`);

                if (!data.success) {
                    throw new Error(data.error || 'Sync failed');
                }

                // Show results
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('syncedCount').textContent = data.results.synced;
                document.getElementById('updatedCount').textContent = data.results.updated;
                document.getElementById('failedCount').textContent = data.results.failed;

                if (data.results.errors && data.results.errors.length > 0) {
                    document.getElementById('errorsList').classList.remove('hidden');
                    const errorsUl = document.getElementById('errors');
                    errorsUl.innerHTML = data.results.errors.map(e => `<li>• ${e}</li>`).join('');
                    log(`⚠️ ${data.results.errors.length} errors occurred`);
                } else {
                    document.getElementById('errorsList').classList.add('hidden');
                }

                if (data.results.synced > 0 || data.results.updated > 0) {
                    document.getElementById('successMessage').classList.remove('hidden');
                    showStatus('✅ Sync completed successfully!', 'success');
                    log(`✅ Successfully synced ${data.results.synced} new topics and updated ${data.results.updated} existing topics`);
                } else {
                    showStatus('⚠️ No topics were synced or updated', 'warning');
                    log('⚠️ No changes made');
                }

            } catch (error) {
                log(`❌ Error: ${error.message}`);
                showStatus(`❌ Sync failed: ${error.message}`, 'error');
                console.error('Sync error:', error);
            }
        }
    </script>
</body>
</html>
